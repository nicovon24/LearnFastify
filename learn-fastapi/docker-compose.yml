version: "3.9"

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: statsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck: esperamos que Postgres esté listo antes de arrancar la API.
    # Sin esto, FastAPI intenta conectarse antes de que Postgres termine de iniciar.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servicio FastAPI
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # --reload activa hot-reload durante desarrollo (equivalente a nodemon)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Montamos el código local para que --reload funcione sin rebuild
      - .:/code

volumes:
  postgres_data:
