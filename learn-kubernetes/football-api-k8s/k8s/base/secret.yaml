# ── Secret — credenciales de Postgres ────────────────────────────────────────
#
# POR QUÉ Secret y no ConfigMap para las credenciales:
#   ConfigMap es texto plano en etcd (la DB interna de K8s).
#   Secret también está en base64 en etcd por defecto, pero:
#   1. Kubernetes puede configurarse para cifrar Secrets en reposo (encryption at rest).
#   2. RBAC permite dar acceso a ConfigMaps sin dar acceso a Secrets.
#   3. Kubernetes evita logguear el contenido de Secrets automáticamente.
#   4. Es la convención: los pipelines de CD y las herramientas (Vault, Sealed Secrets,
#      External Secrets Operator) saben que los Secrets son sensibles y los tratan diferente.
#
# ⚠️  BASE64 NO ES CIFRADO — es solo encoding.
#   echo -n "postgres" | base64 → cG9zdGdyZXM=
#   echo -n "password123" | base64 → cGFzc3dvcmQxMjM=
#   echo -n "footballdb" | base64 → Zm9vdGJhbGxkYg==
#
#   En un repo real NUNCA commitees Secrets con valores reales.
#   Opciones para manejo seguro en producción:
#   - Sealed Secrets (Bitnami): cifra el Secret con una clave del cluster
#   - External Secrets Operator: lee de AWS Secrets Manager, Vault, etc.
#   - SOPS: cifra archivos YAML con age o GPG antes de commitear
#
# Para este proyecto de aprendizaje local estos valores son de prueba — OK para commitear.

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret       # nombre por el que lo referenciarán otros recursos
  namespace: default           # namespace donde vive — default para proyectos simples
type: Opaque                   # Opaque = datos arbitrarios (vs kubernetes.io/tls, etc.)
data:
  # Los valores son base64 de las strings reales
  # Para generar: echo -n "mi-valor" | base64
  POSTGRES_USER:     cG9zdGdyZXM=       # "postgres"
  POSTGRES_PASSWORD: cGFzc3dvcmQxMjM=   # "password123"
  POSTGRES_DB:       Zm9vdGJhbGxkYg==   # "footballdb"
