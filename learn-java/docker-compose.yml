# docker-compose.yml — Ecosistema completo del Match Events System
#
# Levanta:
#   - Zookeeper (requerido por Kafka para coordinación de cluster)
#   - Kafka (el message broker)
#   - Postgres para el ingestion service (si decide persistir algo en el futuro)
#   - Postgres para el aggregator service (donde se guardan las stats)
#   - match-ingestion-service (Java/Spring Boot en puerto 8080)
#   - stats-aggregator-service (Java/Spring Boot en puerto 8081)
#
# PARA USAR:
#   1. Primero compilar los JARs: ver README.md
#   2. Levantar todo: docker-compose up --build
#   3. Bajar todo: docker-compose down
#   4. Bajar y borrar volúmenes (datos de DB): docker-compose down -v
#
# SOBRE LA RED:
#   Docker Compose crea una red interna donde cada servicio es accesible
#   por su nombre de servicio como hostname. Por eso el aggregator se conecta
#   a "kafka:29092" — "kafka" es el hostname del container de Kafka dentro
#   de la red de Docker.

version: '3.8'

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  #
  # Kafka depende de Zookeeper para:
  #   - Coordinación del cluster (qué broker es el líder de cada partición)
  #   - Registro de consumers y sus offsets
  #   - Configuración compartida del cluster
  #
  # Nota: Kafka >= 3.3 puede funcionar sin Zookeeper (KRaft mode),
  # pero la mayoría de setups de producción todavía usan Zookeeper.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181       # Puerto que usan los clientes (Kafka) para conectarse
      ZOOKEEPER_TICK_TIME: 2000         # Unidad básica de tiempo en ms para Zookeeper
    ports:
      - "2181:2181"
    networks:
      - scout-network
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy    # Espera a que Zookeeper esté listo
    ports:
      # 9092: el puerto "externo" — para conectarse desde tu máquina host
      # (ej: desde una app corriendo localmente, no en Docker)
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1              # Identificador único de este broker en el cluster
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181   # Cómo conectarse a Zookeeper

      # LISTENERS: dos listeners con direcciones distintas.
      #
      # Por qué dos listeners:
      #   Kafka necesita saber QUÉ dirección decirle a los clients cuando se conectan.
      #   Desde dentro de Docker, los servicios usan "kafka:29092".
      #   Desde fuera de Docker (tu terminal), usás "localhost:9092".
      #
      #   PLAINTEXT://kafka:29092 → para comunicación interna entre containers
      #   PLAINTEXT_HOST://0.0.0.0:9092 → para conexiones desde el host
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Número de particiones por defecto para topics nuevos.
      # Con 3 particiones, podés tener hasta 3 consumers en paralelo en el mismo group.
      KAFKA_NUM_PARTITIONS: 3

      # Replication factor: cuántas copias de cada partición.
      # Con un solo broker (como acá), debe ser 1. En producción sería 3.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Tiempo de retención de mensajes en el topic (7 días en ms).
      # Kafka NO borra mensajes inmediatamente después de que los leyó un consumer —
      # los guarda durante este tiempo. Esto permite releer el historial.
      KAFKA_LOG_RETENTION_MS: 604800000
    networks:
      - scout-network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Postgres para el aggregator ────────────────────────────────────────────
  postgres-aggregator:
    image: postgres:16-alpine
    container_name: postgres-aggregator
    environment:
      POSTGRES_DB: statsdb           # Nombre de la base de datos
      POSTGRES_USER: scout           # Usuario
      POSTGRES_PASSWORD: scout123    # Contraseña (solo para desarrollo local)
    ports:
      - "5433:5432"   # Puerto 5433 en el host para no conflictuar con un Postgres local
    volumes:
      # Volumen nombrado: los datos de Postgres persisten aunque el container se reinicie.
      # Si corrés "docker-compose down -v", se borran los datos.
      - postgres-aggregator-data:/var/lib/postgresql/data
    networks:
      - scout-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scout -d statsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── match-ingestion-service ────────────────────────────────────────────────
  match-ingestion-service:
    build:
      context: ./match-ingestion-service
      dockerfile: Dockerfile
    container_name: match-ingestion-service
    depends_on:
      kafka:
        condition: service_healthy    # Espera a que Kafka esté listo antes de arrancar
    ports:
      - "8080:8080"
    environment:
      # Sobrescribimos las variables del application.yml con los valores de Docker
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - scout-network
    restart: on-failure    # Reiniciar si el servicio falla (útil durante el startup)

  # ── stats-aggregator-service ────────────────────────────────────────────────
  stats-aggregator-service:
    build:
      context: ./stats-aggregator-service
      dockerfile: Dockerfile
    container_name: stats-aggregator-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres-aggregator:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      POSTGRES_HOST: postgres-aggregator
      POSTGRES_DB: statsdb
      POSTGRES_USER: scout
      POSTGRES_PASSWORD: scout123
    networks:
      - scout-network
    restart: on-failure

# ── Redes ────────────────────────────────────────────────────────────────────
#
# Definimos una red interna para que los containers se puedan comunicar
# entre sí por nombre de servicio (ej: "kafka", "postgres-aggregator").
# Sin esto, cada container estaría aislado.
networks:
  scout-network:
    driver: bridge    # La red por defecto de Docker — un switch virtual

# ── Volúmenes ─────────────────────────────────────────────────────────────────
#
# Los volúmenes nombrados persisten datos en el host de Docker.
# Los datos de Postgres sobreviven a reinicios de containers.
volumes:
  postgres-aggregator-data:
